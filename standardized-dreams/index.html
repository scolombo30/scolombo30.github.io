<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standardized Dreams | Visual Archive</title>
    <link rel="icon" type="image/png" href="../assets/icon.png">
    <link rel="apple-touch-icon" href="../assets/icon.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>

    <nav class="island-nav">
        <a href="../index.html" class="nav-brand">SC</a>
        <span class="nav-divider"></span>
        <a href="../index.html"><span>← Archive</span></a>
        <span class="nav-divider"></span>
        <div class="language-switch">
            <button onclick="setLanguage('en')" id="btn-en">EN</button>
            <button onclick="setLanguage('it')" id="btn-it">IT</button>
        </div>
    </nav>

    <header class="series-header">
        <h1 id="label-title" data-reveal-blur></h1>
        <p id="label-description" data-reveal-blur></p>
    </header>

    <div class="story-container">
        <section class="photo-section" data-reveal-scale>
            <img src="img/The-Red-Conquest.webp" alt="The Red Conquest">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/Orbiting-the-Earthbound.webp" alt="Orbiting the Earthbound">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/Vertical-Collective.webp" alt="Vertical Collective">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/Units-of-Life.webp" alt="Units of Life">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/Signal-in-the-Static.webp" alt="Signal in the Static">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/Floral-Decay.webp" alt="Floral Decay">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section" data-reveal-scale>
            <img src="img/The-Floating-Dream.webp" alt="The Floating Dream">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>
    </div>

    <div class="audio-player">
        <span id="label-transmission">Voice Transmission</span>
        <audio id="main-audio" controls controlsList="nodownload noplaybackrate">
            <source src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <footer class="series-footer">
        <div class="divider"></div>
        <a href="../index.html" id="label-footer" class="big-link"></a>
    </footer>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; <span class="footer-year"></span> SEBASTIAN COLOMBO — ALL RIGHTS RESERVED</p>
            <div class="footer-links">
                <span>Visual Archive v2.0</span>
                <span class="footer-separator">|</span>
                <a href="https://www.instagram.com/sc_photos_dump/">Instagram</a>
            </div>
        </div>
    </footer>

</body>
</html>
