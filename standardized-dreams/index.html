<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standardized Dreams | Visual Archive</title>
    <link rel="stylesheet" href="../style.css"> 
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>

    <div class="language-switch">
        <button onclick="setLanguage('en')" id="btn-en">EN</button>
        <button onclick="setLanguage('it')" id="btn-it">IT</button>
    </div>

    <nav>
        <a href="../index.html" id="label-back" class="back-link"></a>
    </nav>

    <div class="story-container">
        <header class="series-header">
            <h1 id="label-title"></h1>
            <p id="label-description"></p>
        </header>

        <section class="photo-section">
            <img src="img/The-Red-Conquest.webp" alt="The Red Conquest">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/Orbiting-the-Earthbound.webp" alt="Orbiting the Earthbound">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/Vertical-Collective.webp" alt="Vertical Collective">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/Units-of-Life.webp" alt="Units of Life">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/Signal-in-the-Static.webp" alt="Signal in the Static">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/Floral-Decay.webp" alt="Floral Decay">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

        <section class="photo-section">
            <img src="img/The-Floating-Dream.webp" alt="The Floating Dream">
            <div class="caption">
                <h3 class="cap-h"></h3>
                <p class="cap-p"></p>
            </div>
        </section>

    </div>

    <div class="audio-player">
        <span id="label-transmission">Voice Transmission</span>
        <audio id="main-audio" controls controlsList="nodownload noplaybackrate">
            <source src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

    <footer class="series-footer">
        <div class="divider"></div>
        <a href="../index.html" id="label-footer" class="back-link big-link"></a>
    </footer>

</body>
</html>
